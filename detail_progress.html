  <script>
gsap.registerPlugin(ScrollTrigger);
//===================================================descripted Text=================================================================
//=============================================================================================================================
const scrambleChars =
  "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
// Function for decrypt effect
function decryptText(el) {
  const original = el.textContent;
  const chars = original.split("");
  let iterations = 0;
  const maxIterations = chars.length + 5;
  const interval = setInterval(() => {
    el.textContent = chars
      .map((ch, i) => {
        if (ch === " ") return " ";
        return i < iterations
          ? chars[i]
          : scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
      })
      .join("");
    iterations++;
    if (iterations > chars.length) clearInterval(interval);
  }, 40);
}
// Apply ScrollTrigger to each element
document.querySelectorAll("[cs-element='descripted']").forEach((el) => {
  ScrollTrigger.create({
    trigger: el,
    start: "top 80%", // when element enters 80% from top
    onEnter: () => {
      el.classList.add("active");
      decryptText(el);
    },
    once: true, // run only once
  });
});
const splitTypes = document.querySelectorAll(".is-highlights");
splitTypes.forEach((char, i) => {
  const text = new SplitText(char, { types: ["chars", "words"] });
  gsap.from(text.chars, {
    scrollTrigger: {
      trigger: char,
      start: "-60% 70%",
      end: "-60% 10%",
      scrub: true,
      // markers: true
    },
    opacity: 0.4,
    stagger: 0.1,
  });
});
</script>
